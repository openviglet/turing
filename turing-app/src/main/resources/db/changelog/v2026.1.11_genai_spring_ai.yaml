databaseChangeLog:
  - changeSet:
      id: v2026.1.11-01-llm-instance-spring-ai-columns
      author: viglet-team
      validCheckSum: ANY
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - not:
              or:
                - columnExists:
                    tableName: llm_instance
                    columnName: providerOptionsJson
                - columnExists:
                    tableName: llm_instance
                    columnName: provider_options_json
          - not:
              or:
                - columnExists:
                    tableName: llm_instance
                    columnName: apiKeyEncrypted
                - columnExists:
                    tableName: llm_instance
                    columnName: api_key_encrypted
      changes:
        - addColumn:
            tableName: llm_instance
            columns:
              - column:
                  name: providerOptionsJson
                  type: TEXT
              - column:
                  name: apiKeyEncrypted
                  type: VARCHAR(4096)

  - changeSet:
      id: v2026.1.11-02-store-instance-spring-ai-columns
      author: viglet-team
      validCheckSum: ANY
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - not:
              or:
                - columnExists:
                    tableName: store_instance
                    columnName: collectionName
                - columnExists:
                    tableName: store_instance
                    columnName: collection_name
          - not:
              or:
                - columnExists:
                    tableName: store_instance
                    columnName: providerOptionsJson
                - columnExists:
                    tableName: store_instance
                    columnName: provider_options_json
          - not:
              or:
                - columnExists:
                    tableName: store_instance
                    columnName: credentialEncrypted
                - columnExists:
                    tableName: store_instance
                    columnName: credential_encrypted
      changes:
        - addColumn:
            tableName: store_instance
            columns:
              - column:
                  name: collectionName
                  type: VARCHAR(255)
              - column:
                  name: providerOptionsJson
                  type: TEXT
              - column:
                  name: credentialEncrypted
                  type: VARCHAR(4096)

  - changeSet:
      id: v2026.1.11-02a-llm-provider-options-json-if-missing
      author: viglet-team
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        not:
          or:
            - columnExists:
                tableName: llm_instance
                columnName: providerOptionsJson
            - columnExists:
                tableName: llm_instance
                columnName: provider_options_json
      changes:
        - addColumn:
            tableName: llm_instance
            columns:
              - column:
                  name: providerOptionsJson
                  type: TEXT

  - changeSet:
      id: v2026.1.11-02b-llm-api-key-encrypted-if-missing
      author: viglet-team
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        not:
          or:
            - columnExists:
                tableName: llm_instance
                columnName: apiKeyEncrypted
            - columnExists:
                tableName: llm_instance
                columnName: api_key_encrypted
      changes:
        - addColumn:
            tableName: llm_instance
            columns:
              - column:
                  name: apiKeyEncrypted
                  type: VARCHAR(4096)

  - changeSet:
      id: v2026.1.11-02c-store-collection-name-if-missing
      author: viglet-team
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        not:
          or:
            - columnExists:
                tableName: store_instance
                columnName: collectionName
            - columnExists:
                tableName: store_instance
                columnName: collection_name
      changes:
        - addColumn:
            tableName: store_instance
            columns:
              - column:
                  name: collectionName
                  type: VARCHAR(255)

  - changeSet:
      id: v2026.1.11-02d-store-provider-options-json-if-missing
      author: viglet-team
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        not:
          or:
            - columnExists:
                tableName: store_instance
                columnName: providerOptionsJson
            - columnExists:
                tableName: store_instance
                columnName: provider_options_json
      changes:
        - addColumn:
            tableName: store_instance
            columns:
              - column:
                  name: providerOptionsJson
                  type: TEXT

  - changeSet:
      id: v2026.1.11-02e-store-credential-encrypted-if-missing
      author: viglet-team
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        not:
          or:
            - columnExists:
                tableName: store_instance
                columnName: credentialEncrypted
            - columnExists:
                tableName: store_instance
                columnName: credential_encrypted
      changes:
        - addColumn:
            tableName: store_instance
            columns:
              - column:
                  name: credentialEncrypted
                  type: VARCHAR(4096)

  - changeSet:
      id: v2026.1.11-03-update-llm-vendor-plugin
      author: viglet-team
      changes:
        - update:
            tableName: llm_vendor
            columns:
              - column:
                  name: plugin
                  value: openai
            where: id = 'OPENAI'
        - update:
            tableName: llm_vendor
            columns:
              - column:
                  name: plugin
                  value: ollama
            where: id = 'OLLAMA'

  - changeSet:
      id: v2026.1.11-04-update-store-vendor-plugin
      author: viglet-team
      changes:
        - update:
            tableName: store_vendor
            columns:
              - column:
                  name: plugin
                  value: chroma
            where: id = 'CHROMA'
        - update:
            tableName: store_vendor
            columns:
              - column:
                  name: plugin
                  value: milvus
            where: id = 'MILVUS'
