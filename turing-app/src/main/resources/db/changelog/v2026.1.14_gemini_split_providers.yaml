databaseChangeLog:
  - changeSet:
      id: v2026.1.14-00-widen-llm-instance-vendor-id
      author: viglet-team
      changes:
        - modifyDataType:
            tableName: llm_instance
            columnName: llm_vendor_id
            newDataType: VARCHAR(20)

  - changeSet:
      id: v2026.1.14-01-add-gemini-openai-vendor
      author: viglet-team
      preConditions:
        onFail: MARK_RAN
        not:
          - sqlCheck:
              expectedResult: "1"
              sql: "SELECT COUNT(*) FROM llm_vendor WHERE id = 'GEMINI_OPENAI'"
      changes:
        - insert:
            tableName: llm_vendor
            columns:
              - column:
                  name: id
                  value: GEMINI_OPENAI
              - column:
                  name: description
                  value: "Google Gemini via OpenAI-compatible endpoint"
              - column:
                  name: plugin
                  value: gemini-openai
              - column:
                  name: title
                  value: "Google Gemini (OpenAI Compatible)"
              - column:
                  name: website
                  value: "https://ai.google.dev"

  - changeSet:
      id: v2026.1.14-02-migrate-existing-gemini-instances
      author: viglet-team
      preConditions:
        onFail: MARK_RAN
        not:
          - sqlCheck:
              expectedResult: "0"
              sql: "SELECT COUNT(*) FROM llm_instance WHERE llm_vendor_id = 'GEMINI'"
      changes:
        - sql:
            sql: "UPDATE llm_instance SET llm_vendor_id = 'GEMINI_OPENAI' WHERE llm_vendor_id = 'GEMINI'"

  - changeSet:
      id: v2026.1.14-03-update-gemini-vendor-to-native
      author: viglet-team
      changes:
        - update:
            tableName: llm_vendor
            columns:
              - column:
                  name: description
                  value: "Google Gemini (native GenAI SDK)"
              - column:
                  name: title
                  value: Google Gemini
            where: id = 'GEMINI'
