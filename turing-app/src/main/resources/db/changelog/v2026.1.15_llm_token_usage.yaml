databaseChangeLog:
  - changeSet:
      id: v2026.1.15-00-create-llm-token-usage-table
      author: viglet-team
      preConditions:
        onFail: MARK_RAN
        not:
          - tableExists:
              tableName: llm_token_usage
      changes:
        - createTable:
            tableName: llm_token_usage
            columns:
              - column:
                  name: id
                  type: VARCHAR(50)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: llm_instance_id
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: vendor_id
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: model_name
                  type: VARCHAR(100)
              - column:
                  name: username
                  type: VARCHAR(255)
              - column:
                  name: input_tokens
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: output_tokens
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: total_tokens
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: llm_token_usage
            baseColumnNames: llm_instance_id
            referencedTableName: llm_instance
            referencedColumnNames: id
            constraintName: fk_token_usage_llm_instance
        - createIndex:
            indexName: idx_token_usage_instance_date
            tableName: llm_token_usage
            columns:
              - column:
                  name: llm_instance_id
              - column:
                  name: created_at
        - createIndex:
            indexName: idx_token_usage_created_at
            tableName: llm_token_usage
            columns:
              - column:
                  name: created_at
