databaseChangeLog:
  - changeSet:
      id: add-context-window-to-llm-instance
      author: claude
      preConditions:
        - onFail: MARK_RAN
        - not:
            - columnExists:
                tableName: llm_instance
                columnName: context_window
      changes:
        - addColumn:
            tableName: llm_instance
            columns:
              - column:
                  name: context_window
                  type: INT
                  defaultValueNumeric: 128000
