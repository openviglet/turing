databaseChangeLog:
  - changeSet:
      id: v2026.1.11-05-widen-llm-vendor-id
      author: viglet-team
      changes:
        - modifyDataType:
            tableName: llm_vendor
            columnName: id
            newDataType: VARCHAR(20)

  - changeSet:
      id: v2026.1.11-06-add-anthropic-vendor
      author: viglet-team
      preConditions:
        onFail: MARK_RAN
        not:
          - sqlCheck:
              expectedResult: "1"
              sql: "SELECT COUNT(*) FROM llm_vendor WHERE id = 'ANTHROPIC'"
      changes:
        - insert:
            tableName: llm_vendor
            columns:
              - column:
                  name: id
                  value: ANTHROPIC
              - column:
                  name: description
                  value: "Anthropic (Claude)"
              - column:
                  name: plugin
                  value: anthropic
              - column:
                  name: title
                  value: Anthropic
              - column:
                  name: website
                  value: "https://anthropic.com"

  - changeSet:
      id: v2026.1.11-07-add-gemini-vendor
      author: viglet-team
      preConditions:
        onFail: MARK_RAN
        not:
          - sqlCheck:
              expectedResult: "1"
              sql: "SELECT COUNT(*) FROM llm_vendor WHERE id = 'GEMINI'"
      changes:
        - insert:
            tableName: llm_vendor
            columns:
              - column:
                  name: id
                  value: GEMINI
              - column:
                  name: description
                  value: "Google Gemini"
              - column:
                  name: plugin
                  value: gemini
              - column:
                  name: title
                  value: Google Gemini
              - column:
                  name: website
                  value: "https://ai.google.dev"

  - changeSet:
      id: v2026.1.11-08-add-azure-openai-vendor
      author: viglet-team
      preConditions:
        onFail: MARK_RAN
        not:
          - sqlCheck:
              expectedResult: "1"
              sql: "SELECT COUNT(*) FROM llm_vendor WHERE id = 'AZURE_OPENAI'"
      changes:
        - insert:
            tableName: llm_vendor
            columns:
              - column:
                  name: id
                  value: AZURE_OPENAI
              - column:
                  name: description
                  value: "Azure OpenAI (Copilot)"
              - column:
                  name: plugin
                  value: azure-openai
              - column:
                  name: title
                  value: Azure OpenAI
              - column:
                  name: website
                  value: "https://azure.microsoft.com/products/ai-services/openai-service"
